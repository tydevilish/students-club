name: Build, Test & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Stage 1: LINT & TEST (runs immediately, no Docker needed)
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Install backend dependencies
        working-directory: backend
        run: bun install

      - name: Lint frontend
        working-directory: frontend
        run: bun run lint

      - name: Lint backend
        working-directory: backend
        run: bun run lint

      - name: Test backend
        working-directory: backend
        run: bun run test

      - name: Build frontend (type check)
        working-directory: frontend
        run: bun run build

  # Stage 2: BUILD DOCKER IMAGES (runs in parallel with lint)
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: std-club-backend:latest
          outputs: type=docker,dest=/tmp/backend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: std-club-frontend:latest
          outputs: type=docker,dest=/tmp/frontend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar
          retention-days: 1

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar
          retention-days: 1

  # Stage 2.5: SECURITY SCAN
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Download frontend image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/backend-image.tar
          docker load -i /tmp/frontend-image.tar

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "std-club-backend:latest"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "std-club-frontend:latest"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  # Stage 3: DEPLOY TO LOCAL SERVER
  deploy:
    name: Deploy to Local Server
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-images, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Download frontend image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.HOST_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload Docker images and source code
        run: |
          # Create deployment directory
          ssh ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }} "mkdir -p /root/students-club"

          # Upload Docker image tar files
          scp /tmp/backend-image.tar ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }}:/root/students-club/
          scp /tmp/frontend-image.tar ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }}:/root/students-club/

          # Upload source code
          tar -czf - \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='*.sqlite' \
            . | ssh ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }} \
            "tar -xzf - -C /root/students-club"

      - name: Create .env on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }} << 'EOF'
          cat > /root/students-club/.env << ENVFILE
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          DB_NAME=club_registration
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          ENVFILE
          chmod 600 /root/students-club/.env
          EOF

      - name: Load images and deploy
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }} << 'EOF'
          cd /root/students-club

          # Load Docker images
          docker load -i backend-image.tar
          docker load -i frontend-image.tar

          # Clean up tar files
          rm -f backend-image.tar frontend-image.tar

          # Deploy with docker-compose
          docker compose down || true
          docker compose up -d

          # Clean up unused images
          docker image prune -af
          EOF

      - name: Health check
        run: |
          echo "Waiting 30s for services to start..."
          sleep 30

          # Check backend health
          ssh ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }} << 'EOF'
          echo "=== Checking container status ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

          echo ""
          echo "=== Backend health check ==="
          if curl -sf http://localhost:14001/api/health > /dev/null 2>&1; then
            echo "✅ Backend is healthy"
          else
            echo "⚠️ Backend health endpoint not responding (may not have /api/health route)"
            # Fallback: check if container is running
            if docker ps --filter "name=club-backend" --filter "status=running" -q | grep -q .; then
              echo "✅ Backend container is running"
            else
              echo "❌ Backend container is NOT running!"
              docker logs club-backend --tail 20
              exit 1
            fi
          fi

          echo ""
          echo "=== Frontend health check ==="
          if docker ps --filter "name=club-frontend" --filter "status=running" -q | grep -q .; then
            echo "✅ Frontend container is running"
          else
            echo "❌ Frontend container is NOT running!"
            docker logs club-frontend --tail 20
            exit 1
          fi

          echo ""
          echo "=== MySQL health check ==="
          if docker ps --filter "name=club-mysql" --filter "status=running" -q | grep -q .; then
            echo "✅ MySQL container is running"
          else
            echo "❌ MySQL container is NOT running!"
            docker logs club-mysql --tail 20
            exit 1
          fi
          EOF
