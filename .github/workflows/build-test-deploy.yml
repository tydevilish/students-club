name: Build, Test & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Stage 1: BUILD
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Build backend
        working-directory: backend
        run: echo "Backend ready"

  # Stage 2: TEST
  test:
    name: ✅ Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Lint and test
        run: |
          echo "✅ Skipping lint/test - scripts not configured yet"

  # Stage 3: DEPLOY
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.HOST_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload and deploy
        run: |
          tar -czf - \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='*.sqlite' \
            . | ssh ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }} \
            "mkdir -p /root/students-club && tar -xzf - -C /root/students-club && cd /root/students-club && docker compose up -d --build && docker image prune -af"
