name: Build, Test & Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Stage 1: BUILD
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ job.status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run -r frontend build

      - name: Build backend
        run: bun run -r backend start &
        timeout-minutes: 1
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            frontend/.next
            frontend/public
          retention-days: 1

  # Stage 2: TEST
  test:
    name: ✅ Test
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint code
        run: |
          if [ -f frontend/package.json ]; then
            echo "Checking frontend..."
            bun run -r frontend lint || echo "No frontend lint script"
          fi
          if [ -f backend/package.json ]; then
            echo "Checking backend..."
            bun run -r backend lint || echo "No backend lint script"
          fi

      - name: Test frontend
        run: |
          if [ -f frontend/package.json ]; then
            bun run -r frontend test || echo "No frontend tests"
          fi
        continue-on-error: true

      - name: Test backend
        run: |
          if [ -f backend/package.json ]; then
            bun run -r backend test || echo "No backend tests"
          fi
        continue-on-error: true

  # Stage 3: DEPLOY
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()
    environment:
      name: production
      url: ${{ secrets.DEPLOY_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd
        continue-on-error: true

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.HOST_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload files to server
        run: |
          tar -czf - \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='*.sqlite' \
            . | ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }} \
            "mkdir -p ${{ secrets.APP_DIR }} && tar -xzf - -C ${{ secrets.APP_DIR }}"

      - name: Deploy with Docker Compose
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }} <<'EOF'
          set -e
          cd ${{ secrets.APP_DIR }}
          
          # Create .env file
          cat > .env <<ENVEOF
          NODE_ENV=production
          PORT=${{ secrets.PORT }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET=${{ secrets.DISCORD_CLIENT_SECRET }}
          DISCORD_REDIRECT_URI=${{ secrets.DISCORD_REDIRECT_URI }}
          AUTHORIZED_DISCORD_USER_ID=${{ secrets.AUTHORIZED_DISCORD_USER_ID }}
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          BASE_URL=${{ secrets.BASE_URL }}
          ENVEOF
          
          # Deploy
          docker compose down --remove-orphans || true
          docker compose up -d --build
          docker image prune -af
          
          echo "✅ Deployment complete!"
          EOF

      - name: Health check
        run: |
          sleep 5
          curl -f ${{ secrets.DEPLOY_URL }}/health || echo "⚠️ Health check failed"
        continue-on-error: true

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
