name: Build, Test & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Stage 1: BUILD DOCKER IMAGES
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: std-club-backend:latest
          outputs: type=docker,dest=/tmp/backend-image.tar

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: std-club-frontend:latest
          outputs: type=docker,dest=/tmp/frontend-image.tar

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar
          retention-days: 1

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar
          retention-days: 1

  # Stage 2: TEST
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Lint and test
        run: |
          echo "Skipping lint/test - scripts not configured yet"

  # Stage 3: DEPLOY TO LOCAL SERVER
  deploy:
    name: Deploy to Local Server
    runs-on: ubuntu-latest
    needs: [build-images, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Download frontend image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.HOST_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload Docker images and source code
        run: |
          # Create deployment directory
          ssh ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }} "mkdir -p /root/students-club"

          # Upload Docker image tar files
          scp /tmp/backend-image.tar ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }}:/root/students-club/
          scp /tmp/frontend-image.tar ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }}:/root/students-club/

          # Upload source code
          tar -czf - \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='*.sqlite' \
            . | ssh ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }} \
            "tar -xzf - -C /root/students-club"

      - name: Load images and deploy
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.HOST_IP }} << 'EOF'
          cd /root/students-club

          # Load Docker images
          docker load -i backend-image.tar
          docker load -i frontend-image.tar

          # Clean up tar files
          rm -f backend-image.tar frontend-image.tar

          # Deploy with docker-compose
          docker compose down || true
          docker compose up -d

          # Clean up unused images
          docker image prune -af
          EOF
